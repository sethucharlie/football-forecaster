name: Seed Data

on:
  schedule:
    - cron: '0 5 * * 1'
    - cron: '0 5 * * 3'
    - cron: '0 5 * * 5'
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install understat --no-deps

      - name: Debug environment
        run: |
          python -c "import os; print('DB:', os.getenv('DATABASE_URL', 'NOT FOUND')[:20])"


      - name: Run fixtures seeder
        run: |
          cd apps/api
          python scripts/seed_fixtures.py